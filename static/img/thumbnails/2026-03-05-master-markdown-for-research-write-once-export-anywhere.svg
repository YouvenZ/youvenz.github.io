<svg xmlns="http://www.w3.org/2000/svg" width="600" height="340" viewBox="0 0 600 340">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#451a03"/>
      <stop offset="100%" stop-color="#0f0a00"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f59e0b44"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="340" fill="url(#bgGrad)" rx="10"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="5" height="340" fill="url(#barGrad)" rx="2"/>

  <!-- Decorative glow circles -->
  <circle cx="530" cy="50" r="100" fill="#f59e0b" opacity="0.07"/>
  <circle cx="530" cy="50" r="60"  fill="#f59e0b" opacity="0.06"/>
  <circle cx="80"  cy="290" r="70" fill="#f59e0b" opacity="0.05"/>

  <!-- Cluster badge -->
  <rect x="38" y="36" width="280" height="30" rx="6" fill="#f59e0b" opacity="0.15"/>
  <text x="50" y="57"
        font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
        font-size="13" font-weight="600" fill="#f59e0b">🖊️ Academic Writing Stack</text>

  <!-- Title -->
  <text x="40" y="158"
        font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
        font-size="30" font-weight="700" fill="#ffffff"
        letter-spacing="-0.3">Master Markdown for —</text>
  <text x="40" y="196" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="30" font-weight="700" fill="#ffffff" letter-spacing="-0.3">Research Write Once, Export …</text>

  <!-- Bottom stripe -->
  <rect x="0" y="296" width="600" height="44" fill="#f59e0b" opacity="0.12" rx="0"/>
  <rect x="0" y="296" width="600" height="2"  fill="#f59e0b" opacity="0.4"/>
  <text x="50" y="323"
        font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
        font-size="13" fill="#f59e0b" opacity="0.85" font-weight="500">Augmented Scholars</text>
</svg>