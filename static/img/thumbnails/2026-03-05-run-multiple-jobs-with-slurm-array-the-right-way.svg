<svg xmlns="http://www.w3.org/2000/svg" width="600" height="340" viewBox="0 0 600 340">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#050e1c"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#3b82f644"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="340" fill="url(#bgGrad)" rx="10"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="5" height="340" fill="url(#barGrad)" rx="2"/>

  <!-- Decorative glow circles -->
  <circle cx="530" cy="50" r="100" fill="#3b82f6" opacity="0.07"/>
  <circle cx="530" cy="50" r="60"  fill="#3b82f6" opacity="0.06"/>
  <circle cx="80"  cy="290" r="70" fill="#3b82f6" opacity="0.05"/>

  <!-- Cluster badge -->
  <rect x="38" y="36" width="280" height="30" rx="6" fill="#3b82f6" opacity="0.15"/>
  <text x="50" y="57"
        font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
        font-size="13" font-weight="600" fill="#3b82f6">⚙️ HPC &amp; Dev Environment</text>

  <!-- Title -->
  <text x="40" y="158"
        font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
        font-size="30" font-weight="700" fill="#ffffff"
        letter-spacing="-0.3">Run Multiple Jobs with The</text>
  <text x="40" y="196" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="30" font-weight="700" fill="#ffffff" letter-spacing="-0.3">SLURM Array: Right Way</text>

  <!-- Bottom stripe -->
  <rect x="0" y="296" width="600" height="44" fill="#3b82f6" opacity="0.12" rx="0"/>
  <rect x="0" y="296" width="600" height="2"  fill="#3b82f6" opacity="0.4"/>
  <text x="50" y="323"
        font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
        font-size="13" fill="#3b82f6" opacity="0.85" font-weight="500">Augmented Scholars</text>
</svg>