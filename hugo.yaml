baseURL: "https://youvenzful.github.io/"
languageCode: "en-us"
title: "Rachid Youven Zeghlache"

# Output formats
outputs:
  home:
    - HTML
    - RSS
    - JSON
  section:
    - HTML
    - RSS

# Pagination
pagination:
  pagerSize: 10

# Enable Git info for lastmod (set to true after git init)
enableGitInfo: false

# Taxonomies
taxonomies:
  tag: tags
  category: categories

# Markup
markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    style: github
    lineNos: false

# Site params
params:
  # Identity
  name: "Rachid Youven Zeghlache"
  role: "Research Engineer & AI Researcher"
  institution: ""
  email: "youven.z@gmail.com"
  avatar: "/img/avatar.jpg"
  bio: >
    I am an AI researcher specialising in medical image analysis, multi-modal
    learning, and longitudinal deep learning for predictive medicine. My PhD
    focused on diabetic retinopathy progression prediction. I am also the creator
    of the Augmented Scholars newsletter and YouTube channel on AI for health.

  # Social
  social:
    googleScholar: "https://scholar.google.com/citations?user=iWgYuY0AAAAJ&hl=en"
    github: "https://github.com/youvenzful"
    linkedin: "https://www.linkedin.com/in/rachid-youven-zeghlache/"
    twitter: ""
    cv: "/cv.pdf"

  # Research interests (tags)
  interests:
    - Multi-modal Learning
    - Longitudinal Learning
    - Predictive Medicine
    - Medical Imaging
    - Agentic AI for Health

  # YouTube
  youtubeChannelId: "UCxxxxxxxxxxxxxxxx"
  youtubeChannelUrl: "https://www.youtube.com/@youvenzful"

  # Substack
  substackUrl: "https://augmentedscholars.substack.com"
  substackEmbedUrl: "https://augmentedscholars.substack.com/embed"

  # Contact
  contactFormAction: "https://formspree.io/f/yourformid"
  officeLocation: "IMT Atlantique, France"

  # Analytics (leave empty to disable)
  googleAnalytics: ""
  plausibleDomain: ""

  # Comments via Giscus
  giscusRepo: "yourname/yourname.github.io"
  giscusRepoId: ""
  giscusCategory: "Comments"
  giscusCategoryId: ""

  # Features
  darkMode: true
  search: true
  cookieConsent: true
  breadcrumbs: true

  # Open Graph
  images:
    - "/img/og-default.png"

  # Pipeline status (GitHub Actions badge)
  githubActionsOwner: "youvenzful"
  githubActionsRepo: "youvenzful.github.io"

# Menus
menus:
  main:
    - name: About
      url: /about/
      weight: 1
    - name: Research
      url: /research/
      weight: 2
    - name: Publications
      url: /publications/
      weight: 3
    - name: Projects
      url: /projects/
      weight: 4
    - name: Talks
      url: /talks/
      weight: 5
    - name: Blog
      url: /blog/
      weight: 6
    - name: Videos
      url: /videos/
      weight: 7
    - name: Newsletter
      url: /newsletter/
      weight: 8
    - name: CV
      url: /cv/
      weight: 9
    - name: Contact
      url: /contact/
      weight: 10
