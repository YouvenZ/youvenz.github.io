{{/* Video card shortcode */}}
{{/* Usage: {{< video-card id="VIDEO_ID" title="Title" date="YYYY-MM-DD" >}} */}}
{{ $id := .Get "id" }}
{{ $title := .Get "title" | default "Video" }}
{{ $date := .Get "date" }}
<div class="card video-card" style="max-width:360px;margin:1rem 0;">
  <a href="https://youtube.com/watch?v={{ $id }}" target="_blank" rel="noopener">
    <div class="video-thumb-wrap" style="border-radius:var(--radius) var(--radius) 0 0;">
      <img
        src="https://img.youtube.com/vi/{{ $id }}/maxresdefault.jpg"
        alt="{{ $title }}"
        class="video-thumb"
        loading="lazy"
        width="480" height="270">
    </div>
  </a>
  <div class="video-body">
    <h3 class="video-title">
      <a href="https://youtube.com/watch?v={{ $id }}" target="_blank" rel="noopener">{{ $title }}</a>
    </h3>
    {{ with $date }}<p class="video-meta">{{ dateFormat "Jan 2, 2006" . }}</p>{{ end }}
  </div>
</div>
