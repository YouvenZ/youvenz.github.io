{{/*  Icon partial — renders a Lucide-style SVG icon inline.
    Usage: {{ partial "icon.html" (dict "name" "layers" "size" "28" "class" "research-svg-icon") }}
*/}}
{{ $name  := .name  | default "circle" }}
{{ $size  := .size  | default "28" }}
{{ $class := .class | default "" }}
<svg xmlns="http://www.w3.org/2000/svg" width="{{ $size }}" height="{{ $size }}" viewBox="0 0 24 24"
     fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"
     stroke-linejoin="round" class="{{ $class }}" aria-hidden="true">
{{ if eq $name "layers" }}
  <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
  <polyline points="2 17 12 22 22 17"></polyline>
  <polyline points="2 12 12 17 22 12"></polyline>
{{ else if eq $name "trending-up" }}
  <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline>
  <polyline points="16 7 22 7 22 13"></polyline>
{{ else if eq $name "activity" }}
  <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
{{ else if eq $name "eye" }}
  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
  <circle cx="12" cy="12" r="3"></circle>
{{ else if eq $name "bot" }}
  <rect x="3" y="11" width="18" height="10" rx="2"></rect>
  <circle cx="12" cy="5" r="2"></circle>
  <path d="M12 7v4"></path>
  <line x1="8" y1="16" x2="8" y2="16"></line>
  <line x1="16" y1="16" x2="16" y2="16"></line>
{{ else if eq $name "zap" }}
  <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
{{ else if eq $name "image" }}
  <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
  <circle cx="8.5" cy="8.5" r="1.5"></circle>
  <polyline points="21 15 16 10 5 21"></polyline>
{{ else if eq $name "award" }}
  <circle cx="12" cy="8" r="6"></circle>
  <path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"></path>
{{ else if eq $name "cpu" }}
  <rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect>
  <rect x="9" y="9" width="6" height="6"></rect>
  <line x1="9" y1="1" x2="9" y2="4"></line>
  <line x1="15" y1="1" x2="15" y2="4"></line>
  <line x1="9" y1="20" x2="9" y2="23"></line>
  <line x1="15" y1="20" x2="15" y2="23"></line>
  <line x1="20" y1="9" x2="23" y2="9"></line>
  <line x1="20" y1="14" x2="23" y2="14"></line>
  <line x1="1" y1="9" x2="4" y2="9"></line>
  <line x1="1" y1="14" x2="4" y2="14"></line>
{{ else if eq $name "microscope" }}
  <path d="M6 18h8"></path>
  <path d="M3 22h18"></path>
  <path d="M14 22a7 7 0 1 0 0-14h-1"></path>
  <path d="M9 14h2"></path>
  <path d="M9 12a2 2 0 0 1-2-2V6h6v4a2 2 0 0 1-2 2Z"></path>
  <path d="M12 6V3a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v3"></path>
{{ else if eq $name "flask" }}
  <path d="M9 3h6v6l3 9H6l3-9z"></path>
  <path d="M6.1 14h11.8"></path>
  <path d="M3 3h18"></path>
{{ else if eq $name "network" }}
  <circle cx="12" cy="5" r="3"></circle>
  <circle cx="4" cy="19" r="3"></circle>
  <circle cx="20" cy="19" r="3"></circle>
  <line x1="12" y1="8" x2="4" y2="16"></line>
  <line x1="12" y1="8" x2="20" y2="16"></line>
{{ else if eq $name "git-merge" }}
  <circle cx="18" cy="18" r="3"></circle>
  <circle cx="6" cy="6" r="3"></circle>
  <path d="M6 21V9a9 9 0 0 0 9 9"></path>
{{ else if eq $name "bar-chart" }}
  <line x1="12" y1="20" x2="12" y2="10"></line>
  <line x1="18" y1="20" x2="18" y2="4"></line>
  <line x1="6" y1="20" x2="6" y2="16"></line>
{{ else }}
  <circle cx="12" cy="12" r="10"></circle>
{{ end }}
</svg>
