{{ if .Site.Params.cookieConsent }}
<div id="cookie-banner" class="cookie-banner" role="dialog" aria-label="Cookie consent" hidden>
  <p>This site uses cookies for analytics. By continuing, you agree to our <a href="/privacy/">privacy policy</a>.</p>
  <div class="cookie-actions">
    <button id="cookie-accept" class="btn btn-sm btn-primary">Accept</button>
    <button id="cookie-decline" class="btn btn-sm btn-ghost">Decline</button>
  </div>
</div>
<script>
  (function(){
    if(!localStorage.getItem('cookie-consent')){
      document.getElementById('cookie-banner').removeAttribute('hidden');
    }
    document.getElementById('cookie-accept')?.addEventListener('click',function(){
      localStorage.setItem('cookie-consent','accepted');
      document.getElementById('cookie-banner').setAttribute('hidden','');
    });
    document.getElementById('cookie-decline')?.addEventListener('click',function(){
      localStorage.setItem('cookie-consent','declined');
      document.getElementById('cookie-banner').setAttribute('hidden','');
    });
  })();
</script>
{{ end }}
